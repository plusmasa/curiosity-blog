---
layout: default
---

<canvas class="echo-bg" id="echo-bg" aria-hidden="true"></canvas>

{% if site.posts.size == 0 %}
<p>No posts yet — the first curious idea is on its way.</p>
{% else %}
<h1 class="content-title divided">Contents</h1>
<ul class="post-list">
  {% for post in site.posts %}
  <li>
    <a class="post-link" href="{{ post.url | relative_url }}">
      <span class="post-link__title">{{ post.title }}</span>
      <span class="post-date">
        <time datetime="{{ post.date | date_to_xmlschema }}">
          {{ post.date | date: "%b %-d, '%y" }}
        </time>
      </span>
    </a>
  </li>
  {% endfor %}
</ul>
{% endif %}

<script type="module">
  // Echo home background — OGL + domain-warped fbm ink shader.
  // Loaded only on the home page. Skipped when reduced motion is set.
  if (!matchMedia('(prefers-reduced-motion: reduce)').matches) {
    import('https://esm.sh/ogl@1.0.11').then(({ Renderer, Program, Mesh, Triangle }) => {
      const canvas = document.getElementById('echo-bg');
      if (!canvas) return;
      const renderer = new Renderer({
        canvas, alpha: false, antialias: true,
        dpr: Math.min(devicePixelRatio || 1, 2),
      });
      const gl = renderer.gl;
      gl.clearColor(34/255, 36/255, 40/255, 1);

      const vert = `
        attribute vec2 uv;
        attribute vec2 position;
        varying vec2 vUv;
        void main(){ vUv = uv; gl_Position = vec4(position, 0.0, 1.0); }
      `;
      const frag = `
        precision highp float;
        varying vec2 vUv;
        uniform float uTime;
        uniform vec2 uRes;
        vec2 hash22(vec2 p){
          p = vec2( dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)) );
          return -1.0 + 2.0 * fract(sin(p) * 43758.5453);
        }
        float noise(vec2 p){
          vec2 i = floor(p), f = fract(p);
          vec2 u = f * f * (3.0 - 2.0 * f);
          return mix(
            mix(dot(hash22(i + vec2(0,0)), f - vec2(0,0)),
                dot(hash22(i + vec2(1,0)), f - vec2(1,0)), u.x),
            mix(dot(hash22(i + vec2(0,1)), f - vec2(0,1)),
                dot(hash22(i + vec2(1,1)), f - vec2(1,1)), u.x), u.y);
        }
        float fbm(vec2 p){
          float v = 0.0, a = 0.5;
          for (int i = 0; i < 5; i++){
            v += a * noise(p);
            p *= 2.0; a *= 0.5;
          }
          return v;
        }
        void main(){
          vec2 uv = (gl_FragCoord.xy - 0.5 * uRes) / min(uRes.x, uRes.y);
          float t = uTime * 0.10;
          vec2 q = vec2( fbm(uv * 1.5 + vec2(0.0, t)), fbm(uv * 1.5 + vec2(5.2, -t)) );
          vec2 r = vec2( fbm(uv * 1.5 + 2.5 * q + vec2(1.7, 9.2) + t),
                         fbm(uv * 1.5 + 2.5 * q + vec2(8.3, 2.8) - t) );
          float v = fbm(uv * 1.5 + 4.0 * r);
          float ink = smoothstep(0.0, 1.1, v);
          vec3 bg  = vec3(0.133, 0.141, 0.157);
          vec3 mid = vec3(0.330, 0.360, 0.420);
          vec3 hi  = vec3(0.840, 0.640, 0.420);
          vec3 col = mix(bg, mid, ink);
          col = mix(col, hi, smoothstep(0.62, 0.92, v) * 0.40);
          float r2 = length(uv);
          col *= 1.0 - smoothstep(0.4, 1.1, r2) * 0.55;
          gl_FragColor = vec4(col, 1.0);
        }
      `;
      const geometry = new Triangle(gl);
      const program = new Program(gl, {
        vertex: vert, fragment: frag,
        uniforms: { uTime: { value: 0 }, uRes: { value: [gl.canvas.width, gl.canvas.height] } },
      });
      const mesh = new Mesh(gl, { geometry, program });

      function resize(){
        renderer.setSize(innerWidth, innerHeight);
        program.uniforms.uRes.value = [gl.canvas.width, gl.canvas.height];
      }
      addEventListener('resize', resize); resize();

      // Pause when the tab is hidden to save battery.
      let running = true;
      document.addEventListener('visibilitychange', () => {
        running = !document.hidden;
        if (running) frame();
      });
      const t0 = performance.now();
      function frame(){
        if (!running) return;
        program.uniforms.uTime.value = (performance.now() - t0) / 1000;
        renderer.render({ scene: mesh });
        requestAnimationFrame(frame);
      }
      frame();
    }).catch((err) => console.warn('Echo background failed to load', err));
  }
</script>
