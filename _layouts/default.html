<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}
    </title>
    <meta
      name="description"
      content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}"
    />
    <meta name="theme-color" content="#222428" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <a href="#main" class="skip-navigation">Skip to content</a>

    <header class="site-header">
      <h1 class="site-title">
        <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
      </h1>
      <p class="site-tagline">{{ site.description }}</p>
    </header>

    <main class="wrap" id="main" role="main">{{ content }}</main>

    <footer class="site-footer">
      © {{ 'now' | date: '%Y' }} {{ site.author | default: site.title }}
    </footer>
  </body>
</html>
