<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}
    </title>
    <meta
      name="description"
      content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}"
    />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <header class="site-header">
      <div class="wrap">
        <h1 class="site-title">
          <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
        </h1>
        <p class="site-tagline">{{ site.description }}</p>
      </div>
    </header>

    <main class="wrap">{{ content }}</main>

    <footer class="site-footer">
      <div class="wrap">
        © {{ 'now' | date: '%Y' }} {{ site.author | default: site.title }}
      </div>
    </footer>
  </body>
</html>
