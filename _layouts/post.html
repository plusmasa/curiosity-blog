---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>
  <p class="post-meta">
    <time datetime="{{ page.date | date_to_xmlschema }}">
      {{ page.date | date: '%B %-d, %Y' }}
    </time>
    {% if page.tags and page.tags.size > 0 %}
    · {{ page.tags | join: ' · ' }}
    {% endif %}
  </p>

  {% if page.image %}
  <img class="post-hero" src="{{ page.image | relative_url }}" alt="{{ page.title }}" />
  {% endif %}

  <div class="post-body">
    {{ content }}
  </div>
</article>
